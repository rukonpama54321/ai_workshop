# Render Blueprint for the FREE workshop demo deploy of the backend.
# Deploy: push to GitHub, then in Render -> New -> Blueprint -> pick this repo.
# Set the `sync: false` secrets (LLM_API_KEY, RESEND_API_KEY, FRONTEND_URL) in the dashboard.
databases:
  - name: medclaim-db
    plan: free

services:
  - type: web
    name: medclaim-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medclaim-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SAP_USE_MOCK
        value: "true"
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_API_KEY
        sync: false
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        value: onboarding@resend.dev
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
